<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>著者年表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0D1117;
            --surface: #141B24;
            --surface2: #1C2735;
            --parchment: #E8DFC8;
            --parchment-dim: #A89F8A;
            --gold: #C9A84C;
            --gold-dim: #7A6530;
            --accent: #5B8EBF;
            --accent-dim: #2D4A63;
            --text: #D4C9B0;
            --text-dim: #7A7060;
            --serif: 'Playfair Display', 'Noto Serif JP', Georgia, serif;
            --mono: 'JetBrains Mono', 'Courier New', monospace;
            --sans: 'Noto Serif JP', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        header {
            padding: 2rem 1.5rem 1.5rem;
            border-bottom: 1px solid var(--gold-dim);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .header-top {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        h1 {
            font-family: var(--serif);
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 400;
            color: var(--parchment);
            letter-spacing: 0.05em;
        }

        h1 span {
            color: var(--gold);
            font-style: italic;
        }

        .subtitle {
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-family: var(--mono);
        }

        /* ── Setup Panel ── */
        #setup-panel {
            max-width: 560px;
            margin: 3rem auto;
            padding: 2rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--gold-dim);
            border-radius: 2px;
        }

        #setup-panel h2 {
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--parchment);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--surface2);
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }

        label {
            font-size: 0.72rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            font-family: var(--mono);
            text-transform: uppercase;
        }

        input,
        select {
            background: var(--bg);
            border: 1px solid var(--accent-dim);
            color: var(--text);
            padding: 0.6rem 0.8rem;
            font-family: var(--mono);
            font-size: 0.82rem;
            border-radius: 2px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text-dim);
        }

        .field-hint {
            font-size: 0.65rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.4rem;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: var(--mono);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.2s, color 0.2s;
        }

        .btn:hover {
            background: var(--gold);
            color: var(--bg);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        /* ── Controls ── */
        #controls {
            display: none;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--surface2);
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }

        #controls.visible {
            display: flex;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-group label {
            white-space: nowrap;
            text-transform: none;
            letter-spacing: 0;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .control-group input,
        .control-group select {
            width: auto;
            padding: 0.35rem 0.6rem;
            font-size: 0.75rem;
        }

        #search-input {
            width: 160px;
        }

        /* ── Timeline ── */
        #timeline-container {
            display: none;
            padding: 1.5rem 1.5rem 4rem;
            overflow-x: auto;
        }

        #timeline-container.visible {
            display: block;
        }

        .timeline-wrapper {
            position: relative;
            min-width: 600px;
        }

        /* Century labels */
        .century-labels {
            display: flex;
            position: relative;
            margin-bottom: 0.5rem;
            margin-left: 180px;
        }

        .century-label {
            position: absolute;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        /* Axis */
        .time-axis {
            position: relative;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--gold-dim) 5%, var(--gold-dim) 95%, transparent);
            margin-left: 180px;
            margin-bottom: 0.3rem;
        }

        .axis-tick {
            position: absolute;
            top: 0;
            width: 1px;
            height: 8px;
            background: var(--gold-dim);
            transform: translateX(-50%);
        }

        .axis-tick.major {
            height: 14px;
            background: var(--gold);
            top: -6px;
        }

        /* Author rows */
        .author-rows {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 0.8rem;
        }

        .author-row {
            display: flex;
            align-items: center;
            height: 28px;
            cursor: pointer;
        }

        .author-row:hover .author-bar {
            filter: brightness(1.3);
        }

        .author-row:hover .author-name {
            color: var(--parchment);
        }

        .author-name {
            width: 175px;
            min-width: 175px;
            padding-right: 10px;
            text-align: right;
            font-size: 0.72rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
            line-height: 1;
        }

        .author-bar-container {
            flex: 1;
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .author-bar {
            position: absolute;
            height: 10px;
            border-radius: 1px;
            transition: filter 0.15s;
            cursor: pointer;
        }

        .era-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Century shading */
        .century-band {
            position: absolute;
            top: 0;
            bottom: 0;
            pointer-events: none;
        }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed;
            display: none;
            background: var(--surface);
            border: 1px solid var(--gold-dim);
            padding: 0.9rem 1.1rem;
            border-radius: 2px;
            z-index: 1000;
            min-width: 200px;
            max-width: 280px;
            pointer-events: none;
        }

        #tooltip.visible {
            display: block;
        }

        .tooltip-name {
            font-family: var(--serif);
            font-size: 0.95rem;
            color: var(--parchment);
            margin-bottom: 0.4rem;
        }

        .tooltip-years {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .tooltip-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .tooltip-meta strong {
            color: var(--text);
        }

        /* ── Status / Error ── */
        #status {
            text-align: center;
            padding: 3rem 1.5rem;
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text-dim);
            display: none;
        }

        #status.visible {
            display: block;
        }

        .error-msg {
            color: #E07070;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--gold-dim);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Legend ── */
        #legend {
            display: none;
            padding: 0.8rem 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            border-top: 1px solid var(--surface2);
        }

        #legend.visible {
            display: flex;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .legend-color {
            width: 20px;
            height: 6px;
            border-radius: 1px;
        }

        /* ── Config save note ── */
        .save-note {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 1rem;
            line-height: 1.6;
        }

        /* ── Mobile adjustments ── */
        @media (max-width: 640px) {
            .author-name {
                width: 100px;
                min-width: 100px;
                font-size: 0.65rem;
            }

            .century-labels {
                margin-left: 105px;
            }

            .time-axis {
                margin-left: 105px;
            }

            #search-input {
                width: 120px;
            }
        }

        /* ── Settings toggle ── */
        #settings-btn {
            font-size: 0.7rem;
            padding: 0.35rem 0.8rem;
        }

        #settings-panel {
            display: none;
            background: var(--surface);
            border: 1px solid var(--surface2);
            padding: 1rem 1.5rem;
        }

        #settings-panel.visible {
            display: block;
        }

        /* ── Author count badge ── */
        .count-badge {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-left: auto;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-top">
            <h1>著者<span>年表</span></h1>
            <span class="count-badge" id="author-count"></span>
        </div>
        <div class="subtitle">Author Timeline — Notion Database</div>
    </header>

    <!-- Setup Panel -->
    <div id="setup-panel">
        <h2>Notion 接続設定</h2>

        <div class="field-group">
            <label>Integration Token</label>
            <input type="password" id="notion-token" placeholder="secret_xxxxxxxxxxxx">
            <span class="field-hint">
                Notion → 設定 → コネクト → 新しいインテグレーションを作成<br>
                データベースのページでインテグレーションを接続してください
            </span>
        </div>

        <div class="field-group">
            <label>Database ID</label>
            <input type="text" id="database-id" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
            <span class="field-hint">
                NotionのデータベースURL: notion.so/xxxxxxxx?v=... の x 部分
            </span>
        </div>

        <div class="field-group">
            <label>著者名プロパティ名</label>
            <input type="text" id="prop-name" placeholder="名前" value="名前">
        </div>

        <div class="field-group">
            <label>生年プロパティ名（Number型）</label>
            <input type="text" id="prop-birth" placeholder="生年" value="生年">
        </div>

        <div class="field-group">
            <label>没年プロパティ名（Number型）</label>
            <input type="text" id="prop-death" placeholder="没年" value="没年">
        </div>

        <div class="field-group">
            <label>カテゴリ/ジャンルプロパティ名（任意）</label>
            <input type="text" id="prop-category" placeholder="ジャンル（空白でスキップ）">
        </div>

        <div class="btn-row">
            <button class="btn" id="connect-btn" onclick="connect()">
                <span>接続して年表を表示</span>
            </button>
        </div>

        <p class="save-note">
            ⚠ トークンとIDはlocalStorageに保存されます。共有PCでは使用しないでください。<br>
            このファイルはローカルで開いて使用するか、セルフホストしてください。
        </p>
    </div>

    <!-- Controls -->
    <div id="controls">
        <div class="control-group">
            <label>検索</label>
            <input type="text" id="search-input" placeholder="著者名...">
        </div>
        <div class="control-group">
            <label>表示範囲</label>
            <input type="number" id="year-from" placeholder="開始年" style="width:80px">
            <span style="color:var(--text-dim);font-size:0.75rem">—</span>
            <input type="number" id="year-to" placeholder="終了年" style="width:80px">
        </div>
        <div class="control-group">
            <label>並び替え</label>
            <select id="sort-select">
                <option value="birth">生年順</option>
                <option value="death">没年順</option>
                <option value="name">名前順</option>
                <option value="span">活動期間順</option>
            </select>
        </div>
        <button class="btn" id="settings-btn" onclick="toggleSettings()">⚙ 設定</button>
    </div>

    <!-- Settings panel (inline, collapsible) -->
    <div id="settings-panel">
        <div style="display:flex;gap:2rem;flex-wrap:wrap;padding:0.5rem 0;">
            <div class="field-group" style="margin:0;min-width:200px">
                <label>Integration Token</label>
                <input type="password" id="settings-token">
            </div>
            <div class="field-group" style="margin:0;min-width:200px">
                <label>Database ID</label>
                <input type="text" id="settings-dbid">
            </div>
            <div style="display:flex;align-items:flex-end;">
                <button class="btn" onclick="reconnect()">再接続</button>
            </div>
        </div>
    </div>

    <!-- Status -->
    <div id="status"></div>

    <!-- Timeline -->
    <div id="timeline-container">
        <div class="timeline-wrapper" id="timeline-wrapper"></div>
    </div>

    <!-- Legend -->
    <div id="legend" id="legend"></div>

    <!-- Tooltip -->
    <div id="tooltip">
        <div class="tooltip-name" id="tt-name"></div>
        <div class="tooltip-years" id="tt-years"></div>
        <div class="tooltip-meta" id="tt-meta"></div>
    </div>

    <script>
        // ── Palette for categories ──
        const CAT_COLORS = [
            '#5B8EBF', '#C9A84C', '#7BAE7F', '#BF7B5B', '#9B7BBF',
            '#BF5B8E', '#7BBFBE', '#BFA87B', '#5B7BBF', '#BF5B5B',
        ];
        const UNKNOWN_COLOR = '#3D4A56';

        let authors = [];
        let catColorMap = {};
        let propName = '名前', propBirth = '生年', propDeath = '没年', propCat = '';

        // ── LocalStorage helpers ──
        function saveConfig() {
            localStorage.setItem('nt_token', document.getElementById('notion-token').value);
            localStorage.setItem('nt_dbid', document.getElementById('database-id').value);
            localStorage.setItem('nt_prop_name', document.getElementById('prop-name').value);
            localStorage.setItem('nt_prop_birth', document.getElementById('prop-birth').value);
            localStorage.setItem('nt_prop_death', document.getElementById('prop-death').value);
            localStorage.setItem('nt_prop_cat', document.getElementById('prop-category').value);
        }
        function loadConfig() {
            const fields = {
                'notion-token': 'nt_token', 'database-id': 'nt_dbid',
                'prop-name': 'nt_prop_name', 'prop-birth': 'nt_prop_birth',
                'prop-death': 'nt_prop_death', 'prop-category': 'nt_prop_cat'
            };
            for (const [id, key] of Object.entries(fields)) {
                const val = localStorage.getItem(key);
                if (val) document.getElementById(id).value = val;
            }
        }
        loadConfig();

        // ── Notion API ──
        async function fetchAllPages(token, dbId) {
            let results = [], cursor = undefined;
            while (true) {
                const body = { page_size: 100 };
                if (cursor) body.start_cursor = cursor;
                const res = await fetch(`https://api.anthropic.com/v1/proxy/notion/v1/databases/${dbId}/query`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(body)
                });
                // Notion APIを直接呼ぶ（CORSプロキシ経由）
                if (!res.ok) {
                    // フォールバック: 直接呼び出し
                    return await fetchDirect(token, dbId);
                }
                const data = await res.json();
                results = results.concat(data.results);
                if (!data.has_more) break;
                cursor = data.next_cursor;
            }
            return results;
        }

        async function fetchDirect(token, dbId) {
            let results = [], cursor = undefined;
            while (true) {
                const body = { page_size: 100 };
                if (cursor) body.start_cursor = cursor;
                const res = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || `HTTP ${res.status}`);
                }
                const data = await res.json();
                results = results.concat(data.results);
                if (!data.has_more) break;
                cursor = data.next_cursor;
            }
            return results;
        }

        function extractText(prop) {
            if (!prop) return '';
            if (prop.type === 'title') return prop.title.map(t => t.plain_text).join('');
            if (prop.type === 'rich_text') return prop.rich_text.map(t => t.plain_text).join('');
            if (prop.type === 'select') return prop.select?.name || '';
            if (prop.type === 'multi_select') return prop.multi_select.map(s => s.name).join(', ');
            return '';
        }
        function extractNumber(prop) {
            if (!prop || prop.type !== 'number') return null;
            return prop.number;
        }

        function parsePages(pages, pName, pBirth, pDeath, pCat) {
            return pages.map(page => {
                const props = page.properties;
                const name = extractText(props[pName]) || '(不明)';
                const birth = extractNumber(props[pBirth]);
                const death = extractNumber(props[pDeath]);
                const cat = pCat ? extractText(props[pCat]) : '';
                const url = page.url;
                return { name, birth, death, cat, url, id: page.id };
            }).filter(a => a.birth !== null || a.death !== null);
        }

        // ── Main connect ──
        async function connect() {
            const token = document.getElementById('notion-token').value.trim();
            const dbId = document.getElementById('database-id').value.trim().replace(/-/g, '');
            propName = document.getElementById('prop-name').value.trim() || '名前';
            propBirth = document.getElementById('prop-birth').value.trim() || '生年';
            propDeath = document.getElementById('prop-death').value.trim() || '没年';
            propCat = document.getElementById('prop-category').value.trim();

            if (!token || !dbId) { alert('トークンとDatabase IDを入力してください'); return; }

            saveConfig();
            showStatus('<span class="spinner"></span> Notionから取得中...');

            try {
                const pages = await fetchDirect(token, dbId);
                authors = parsePages(pages, propName, propBirth, propDeath, propCat);

                if (authors.length === 0) {
                    showStatus('<span class="error-msg">データが見つかりませんでした。プロパティ名を確認してください。</span>');
                    return;
                }

                buildCatColors();
                hideStatus();
                document.getElementById('setup-panel').style.display = 'none';
                document.getElementById('controls').classList.add('visible');
                document.getElementById('timeline-container').classList.add('visible');
                document.getElementById('legend').classList.add('visible');

                // Sync settings panel
                document.getElementById('settings-token').value = token;
                document.getElementById('settings-dbid').value = dbId.replace(/(.{8})(.{4})(.{4})(.{4})(.{12})/, '$1-$2-$3-$4-$5');

                setupControls();
                render();
            } catch (e) {
                showStatus(`<span class="error-msg">エラー: ${e.message}</span><br><span style="font-size:0.7rem;color:var(--text-dim)">※ CORS制限により、ブラウザから直接Notion APIを呼ぶには<br>CORSプロキシ or ローカルサーバーが必要な場合があります。<br>下部のメモを参照してください。</span>`);
            }
        }

        function buildCatColors() {
            const cats = [...new Set(authors.map(a => a.cat).filter(Boolean))];
            cats.forEach((c, i) => { catColorMap[c] = CAT_COLORS[i % CAT_COLORS.length]; });
        }

        function showStatus(html) {
            const s = document.getElementById('status');
            s.innerHTML = html; s.classList.add('visible');
        }
        function hideStatus() {
            const s = document.getElementById('status');
            s.innerHTML = ''; s.classList.remove('visible');
        }

        // ── Controls ──
        function setupControls() {
            document.getElementById('search-input').addEventListener('input', render);
            document.getElementById('year-from').addEventListener('input', render);
            document.getElementById('year-to').addEventListener('input', render);
            document.getElementById('sort-select').addEventListener('change', render);
        }

        function getFiltered() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const yFrom = parseInt(document.getElementById('year-from').value) || null;
            const yTo = parseInt(document.getElementById('year-to').value) || null;
            const sort = document.getElementById('sort-select').value;

            let list = authors.filter(a => {
                if (q && !a.name.toLowerCase().includes(q)) return false;
                if (yFrom && a.death !== null && a.death < yFrom) return false;
                if (yTo && a.birth !== null && a.birth > yTo) return false;
                return true;
            });

            list.sort((a, b) => {
                if (sort === 'birth') return (a.birth ?? 9999) - (b.birth ?? 9999);
                if (sort === 'death') return (a.death ?? 9999) - (b.death ?? 9999);
                if (sort === 'name') return a.name.localeCompare(b.name, 'ja');
                if (sort === 'span') {
                    const sa = (a.death ?? a.birth ?? 0) - (a.birth ?? a.death ?? 0);
                    const sb = (b.death ?? b.birth ?? 0) - (b.birth ?? b.death ?? 0);
                    return sb - sa;
                }
                return 0;
            });

            return list;
        }

        // ── Render ──
        function render() {
            const list = getFiltered();
            document.getElementById('author-count').textContent = `${list.length} / ${authors.length} 著者`;

            const wrapper = document.getElementById('timeline-wrapper');
            wrapper.innerHTML = '';

            if (list.length === 0) {
                wrapper.innerHTML = '<p style="color:var(--text-dim);font-size:0.8rem;padding:2rem 0">該当する著者が見つかりません</p>';
                return;
            }

            // Determine year range
            const allYears = list.flatMap(a => [a.birth, a.death].filter(y => y !== null));
            let minY = Math.min(...allYears);
            let maxY = Math.max(...allYears);
            // Round to nice centuries
            minY = Math.floor(minY / 100) * 100 - 50;
            maxY = Math.ceil(maxY / 100) * 100 + 50;
            const span = maxY - minY;

            // Override with user range
            const yFrom = parseInt(document.getElementById('year-from').value);
            const yTo = parseInt(document.getElementById('year-to').value);
            if (!isNaN(yFrom)) minY = yFrom;
            if (!isNaN(yTo)) maxY = yTo;

            function pct(y) { return ((y - minY) / (maxY - minY)) * 100; }

            // Century labels row
            const labelsDiv = document.createElement('div');
            labelsDiv.className = 'century-labels';
            labelsDiv.style.height = '16px';
            const centuries = [];
            const cStart = Math.ceil(minY / 100) * 100;
            for (let c = cStart; c <= maxY; c += 100) centuries.push(c);
            centuries.forEach(c => {
                const el = document.createElement('div');
                el.className = 'century-label';
                el.style.left = pct(c) + '%';
                el.textContent = c > 0 ? `${c}年` : `${Math.abs(c)}年前`;
                labelsDiv.appendChild(el);
            });
            wrapper.appendChild(labelsDiv);

            // Axis
            const axis = document.createElement('div');
            axis.className = 'time-axis';
            // Century ticks
            centuries.forEach(c => {
                const tick = document.createElement('div');
                tick.className = 'axis-tick major';
                tick.style.left = pct(c) + '%';
                axis.appendChild(tick);
            });
            // 50-year ticks
            for (let y = Math.ceil(minY / 50) * 50; y <= maxY; y += 50) {
                if (y % 100 !== 0) {
                    const tick = document.createElement('div');
                    tick.className = 'axis-tick';
                    tick.style.left = pct(y) + '%';
                    axis.appendChild(tick);
                }
            }
            wrapper.appendChild(axis);

            // Century shading on bar area
            const rowsContainer = document.createElement('div');
            rowsContainer.className = 'author-rows';

            // Author bars
            list.forEach(author => {
                const row = document.createElement('div');
                row.className = 'author-row';

                const nameEl = document.createElement('div');
                nameEl.className = 'author-name';
                nameEl.textContent = author.name;
                row.appendChild(nameEl);

                const barContainer = document.createElement('div');
                barContainer.className = 'author-bar-container';

                const birth = author.birth;
                const death = author.death;
                const color = author.cat ? (catColorMap[author.cat] || UNKNOWN_COLOR) : UNKNOWN_COLOR;

                if (birth !== null && death !== null) {
                    const bar = document.createElement('div');
                    bar.className = 'author-bar';
                    const left = pct(birth);
                    const width = pct(death) - pct(birth);
                    bar.style.left = left + '%';
                    bar.style.width = Math.max(width, 0.3) + '%';
                    bar.style.background = `linear-gradient(90deg, ${color}88, ${color})`;
                    bar.style.border = `1px solid ${color}`;
                    barContainer.appendChild(bar);
                } else if (birth !== null) {
                    const dot = document.createElement('div');
                    dot.className = 'era-dot';
                    dot.style.left = pct(birth) + '%';
                    dot.style.background = color;
                    barContainer.appendChild(dot);
                } else if (death !== null) {
                    const dot = document.createElement('div');
                    dot.className = 'era-dot';
                    dot.style.left = pct(death) + '%';
                    dot.style.background = color;
                    dot.style.opacity = '0.6';
                    barContainer.appendChild(dot);
                }

                row.appendChild(barContainer);

                // Tooltip events
                row.addEventListener('mouseenter', (e) => showTooltip(e, author));
                row.addEventListener('mousemove', (e) => moveTooltip(e));
                row.addEventListener('mouseleave', hideTooltip);
                row.addEventListener('click', () => { if (author.url) window.open(author.url, '_blank'); });

                // Touch
                row.addEventListener('touchstart', (e) => {
                    showTooltip(e.touches[0], author);
                    setTimeout(hideTooltip, 3000);
                }, { passive: true });

                rowsContainer.appendChild(row);
            });

            wrapper.appendChild(rowsContainer);

            // Legend
            buildLegend();
        }

        function buildLegend() {
            const legend = document.getElementById('legend');
            legend.innerHTML = '';
            if (Object.keys(catColorMap).length === 0) {
                legend.classList.remove('visible');
                return;
            }
            legend.classList.add('visible');
            const label = document.createElement('span');
            label.style.cssText = 'font-size:0.65rem;color:var(--text-dim);font-family:var(--mono)';
            label.textContent = 'ジャンル:';
            legend.appendChild(label);
            for (const [cat, color] of Object.entries(catColorMap)) {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<div class="legend-color" style="background:${color}"></div>${cat}`;
                legend.appendChild(item);
            }
        }

        // ── Tooltip ──
        function showTooltip(e, author) {
            const tt = document.getElementById('tooltip');
            document.getElementById('tt-name').textContent = author.name;
            const yStr = [
                author.birth !== null ? `${author.birth}年生` : null,
                author.death !== null ? `${author.death}年没` : null
            ].filter(Boolean).join(' — ');
            document.getElementById('tt-years').textContent = yStr || '年代不明';
            let meta = '';
            if (author.birth !== null && author.death !== null) {
                meta += `<strong>享年</strong> ${author.death - author.birth}歳<br>`;
            }
            if (author.cat) meta += `<strong>ジャンル</strong> ${author.cat}<br>`;
            meta += `<span style="color:var(--accent-dim)">クリックでNotionを開く</span>`;
            document.getElementById('tt-meta').innerHTML = meta;
            tt.classList.add('visible');
            moveTooltip(e);
        }
        function moveTooltip(e) {
            const tt = document.getElementById('tooltip');
            const x = e.clientX, y = e.clientY;
            const tw = tt.offsetWidth, th = tt.offsetHeight;
            const vw = window.innerWidth, vh = window.innerHeight;
            tt.style.left = (x + tw + 16 > vw ? x - tw - 8 : x + 16) + 'px';
            tt.style.top = (y + th + 16 > vh ? y - th - 8 : y + 16) + 'px';
        }
        function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

        // ── Settings toggle ──
        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('visible');
        }
        function reconnect() {
            const token = document.getElementById('settings-token').value.trim();
            const dbId = document.getElementById('settings-dbid').value.trim();
            if (token) document.getElementById('notion-token').value = token;
            if (dbId) document.getElementById('database-id').value = dbId;
            toggleSettings();
            connect();
        }

        // ── CORS note (shown on error) ──
        // Notion APIはブラウザからの直接呼び出しでCORSエラーになる場合があります。
        // 回避策: https://github.com/Rob--W/cors-anywhere のようなプロキシ、
        // またはVite等のローカル開発サーバーでプロキシ設定を行ってください。
    </script>

    <!-- CORS note at bottom -->
    <div id="cors-note" style="display:none;"></div>

</body>

</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>著者年表 — Miyamoto Rin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300&family=Poppins&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/view/styles/page.css" />
    <link rel="stylesheet" href="/view/styles/timeline.css" />
  </head>

  <body>
    <div id="site-header"></div>

    <div class="container">
      <div class="tl-header">
        <h1 class="tl-title">著者<span>年表</span></h1>
        <span class="count-badge" id="author-count"></span>
      </div>

      <div id="controls">
        <div class="control-group">
          <label>検索</label>
          <input type="text" id="search-input" placeholder="著者名..." />
        </div>
        <div class="control-group">
          <label>表示範囲</label>
          <input
            type="number"
            id="year-from"
            placeholder="開始年"
            style="width: 80px"
          />
          <span style="color: var(--text-dim); font-size: 0.75rem">—</span>
          <input
            type="number"
            id="year-to"
            placeholder="終了年"
            style="width: 80px"
          />
        </div>
        <div class="control-group">
          <label>並び替え</label>
          <select id="sort-select">
            <option value="birth">生年順</option>
            <option value="death">没年順</option>
            <option value="name">名前順</option>
            <option value="span">活動期間順</option>
          </select>
        </div>
      </div>

      <div id="status"></div>

      <div id="timeline-container">
        <div class="timeline-wrapper" id="timeline-wrapper"></div>
      </div>

      <div>
        <h3>これは何？</h3>
        <p>
          宮本凜が読んだ本の著者の生没年をタイムラインでいい感じにまとめたもの
        </p>
        <p>
          もともとはNotionのDBでタイムラインで見ようと思っていたが、かなり見づらく仕方なくClaude
          Codeで作成した。
        </p>
      </div>
    </div>

    <div id="tooltip">
      <div class="tooltip-name" id="tt-name"></div>
      <div class="tooltip-years" id="tt-years"></div>
      <div class="tooltip-meta" id="tt-meta"></div>
    </div>

    <div id="site-footer"></div>
    <script src="/controller/components/common-components.js"></script>
    <script src="/controller/timeline/index.js"></script>
  </body>
</html>
